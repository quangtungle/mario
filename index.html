<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#5c94fc" />
  <title>Robot Mario</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #5c94fc;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      position: fixed;
      inset: 0;
    }
    #game {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      width: 100svw;
      height: 100svh;
      width: var(--app-w, 100svw);
      height: var(--app-h, 100svh);
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game canvas {
      display: block;
    }
    #rotate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #1a1a2e;
      color: #fff;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    #rotate .icon {
      font-size: 72px;
      margin-bottom: 16px;
      animation: rot 1.6s ease-in-out infinite;
      display: inline-block;
    }
    #rotate .msg {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    #rotate .sub {
      font-size: 14px;
      opacity: 0.75;
      margin-top: 8px;
    }
    @keyframes rot {
      0%, 100% { transform: rotate(-90deg); }
      50% { transform: rotate(0deg); }
    }
    @media (orientation: portrait) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate">
    <div>
      <div class="icon">📱</div>
      <div class="msg">Rotate your device</div>
      <div class="sub">This game is best played in landscape</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
